<script>
window.AZURE_CONFIG = {
  clientId: "594d9b4a-5884-485e-87aa-b10b94c8190a",
  tenantId: "4184eab0-359c-4763-aae5-6fdeb97d3b74",
  siteId:   "skysensecommx.sharepoint.com,5f7fc766-ccd1-4c4f-beba-7286f19c4234,f69019f3-7d07-4bc0-99fa-406f82d52ed9"
};
const _DF = "cobranza_data.json";
let _ma = null, _mr = false;
async function _gm() {
  if (!_ma) _ma = new msal.PublicClientApplication({
    auth: { clientId: window.AZURE_CONFIG.clientId, authority: "https://login.microsoftonline.com/" + window.AZURE_CONFIG.tenantId, redirectUri: window.location.origin + window.location.pathname },
    cache: { cacheLocation: "localStorage" }
  });
  if (!_mr) { await _ma.initialize(); _mr = true; }
  return _ma;
}
async function _gt() {
  const a = await _gm(), sc = ["Files.ReadWrite","Sites.ReadWrite.All","User.Read"], ac = a.getAllAccounts();
  if (!ac.length) return (await a.loginPopup({scopes:sc})).accessToken;
  try { return (await a.acquireTokenSilent({scopes:sc,account:ac[0]})).accessToken; }
  catch(e) { return (await a.acquireTokenPopup({scopes:sc})).accessToken; }
}
function _gu() { return "https://graph.microsoft.com/v1.0/sites/" + window.AZURE_CONFIG.siteId + "/drive/root:/" + _DF + ":/content"; }
window.__spLoad = async function() {
  const t = await _gt(), r = await fetch(_gu(), {headers:{Authorization:"Bearer "+t}});
  if (r.status === 404) return null;
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
};
window.__spSave = async function(d) {
  const t = await _gt(), r = await fetch(_gu(), {method:"PUT",headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},body:JSON.stringify(d)});
  if (!r.ok) throw new Error("HTTP " + r.status);
};
</script>

<!-- App (JSX compilado por Babel en el navegador) -->
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
  PieChart, Pie, Cell, LineChart, Line, Area, AreaChart, ComposedChart
} = Recharts;

const {
  Plus, Trash2, Edit3, Check, X, Download, Upload, Filter,
  ChevronDown, ChevronUp, DollarSign, Calendar, Users, TrendingUp,
  FileSpreadsheet, Eye, EyeOff, Search, Building2, Zap, Battery, Sun, Grid3x3,
  CheckCircle2, Clock, AlertCircle, Save, FolderOpen, BarChart3, ChevronRight,
  TableProperties, AlertTriangle, FileUp, FileDown, Settings, Palette, UserPlus, UserMinus
} = lucideReact;

const IVA_RATE = 0.16;
const DEFAULT_PMS = [
  { id: "pm1", name: "Rubén Paredes", color: "#3B82F6" },
  { id: "pm2", name: "Isabel Bazán", color: "#10B981" },
  { id: "pm3", name: "Anahí Reyes", color: "#F59E0B" },
  { id: "pm4", name: "Sergio Villalpando", color: "#EF4444" },
  { id: "pm5", name: "Jonatan Miranda", color: "#8B5CF6" },
  { id: "pm6", name: "Marcela Trejo", color: "#EC4899" },
  { id: "pm7", name: "Francisco Cervantes", color: "#06B6D4" },
];
const PROJECT_TYPES = [
  { id: "pv", label: "Fotovoltaico", icon: "sun", color: "#F59E0B" },
  { id: "bess", label: "BESS", icon: "battery", color: "#10B981" },
  { id: "hybrid", label: "Híbrido", icon: "zap", color: "#3B82F6" },
  { id: "microgrid", label: "Microrred", icon: "grid", color: "#8B5CF6" },
];
const PRESET_COLORS = ["#3B82F6","#10B981","#F59E0B","#EF4444","#8B5CF6","#EC4899","#06B6D4","#84CC16","#F97316","#6366F1","#14B8A6","#E11D48"];
const CURRENCIES = ["MXN", "USD"];

const generateId = () => Math.random().toString(36).substr(2, 9);
const formatCurrency = (amount, currency = "MXN") => {
  if (amount == null || isNaN(amount)) return "-";
  return new Intl.NumberFormat("es-MX", { style: "currency", currency, minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(amount);
};
const formatDate = (d) => { if (!d) return "-"; const dt = new Date(d + "T12:00:00"); return dt.toLocaleDateString("es-MX", { day: "2-digit", month: "short", year: "numeric" }); };
const parseWeek = (d) => { const dt = new Date(d + "T12:00:00"); const oneJan = new Date(dt.getFullYear(), 0, 1); return Math.ceil(((dt - oneJan) / 86400000 + oneJan.getDay() + 1) / 7); };

const TypeIcon = ({ type, size = 16 }) => {
  const props = { size, strokeWidth: 2 };
  if (type === "pv") return <Sun {...props} />;
  if (type === "bess") return <Battery {...props} />;
  if (type === "hybrid") return <Zap {...props} />;
  if (type === "microgrid") return <Grid3x3 {...props} />;
  return <Building2 {...props} />;
};

function generateSampleData() {
  const projects = [];
  const types = ["pv", "bess", "hybrid", "microgrid"];
  const sampleNames = {
    pv: ["Parque Solar", "Planta FV", "Central Solar", "Campo Fotovoltaico", "Instalación Solar"],
    bess: ["Almacén Energético", "Sistema BESS", "Banco de Baterías", "Storage Hub", "PowerVault"],
    hybrid: ["Planta Híbrida", "Sistema Integrado", "Complejo Energético", "Hub Renovable", "Centro Híbrido"],
    microgrid: ["Microrred", "Red Autónoma", "Smart Grid", "MiniGrid", "IslaGrid"],
  };
  const locations = ["Sonora", "Chihuahua", "Jalisco", "Nuevo León", "Baja California", "Coahuila", "Tamaulipas", "Aguascalientes", "Querétaro", "Guanajuato", "Yucatán", "Oaxaca", "Puebla", "San Luis Potosí", "Durango"];
  const milestoneTemplates = [
    ["Anticipo", "Ingeniería", "Procura", "Construcción", "Puesta en marcha", "Entrega final"],
    ["Anticipo", "Diseño", "Equipos", "Instalación", "Pruebas", "Cierre"],
    ["Firma", "Ingeniería básica", "Ingeniería detalle", "Procura", "Obra civil", "Montaje", "Comisionamiento", "Entrega"],
    ["Anticipo", "Fase 1", "Fase 2", "Fase 3", "Entrega"],
    ["Anticipo", "Ingeniería", "Procura equipos", "Procura materiales", "Construcción civil", "Montaje eléctrico", "Pruebas SAT", "Pruebas FAT", "Comisionamiento", "Entrega final"],
  ];
  const pctTemplates = [
    [20, 15, 25, 25, 10, 5],
    [30, 10, 20, 20, 15, 5],
    [15, 10, 10, 20, 15, 15, 10, 5],
    [25, 25, 25, 15, 10],
    [10, 8, 15, 12, 15, 12, 8, 8, 7, 5],
  ];
  for (let i = 0; i < 25; i++) {
    const pmIdx = i % 5;
    const pm = DEFAULT_PMS[pmIdx];
    const typeIdx = i % 4;
    const type = types[typeIdx];
    const names = sampleNames[type];
    const loc = locations[i % locations.length];
    const tplIdx = i % milestoneTemplates.length;
    const milestoneNames = milestoneTemplates[tplIdx];
    const pcts = pctTemplates[tplIdx];
    const amount = Math.round((500000 + Math.random() * 9500000) / 1000) * 1000;
    const currency = Math.random() > 0.7 ? "USD" : "MXN";
    const startMonth = Math.floor(Math.random() * 12);
    const startYear = 2025 + Math.floor(Math.random() * 2);
    const milestones = milestoneNames.map((name, idx) => {
      const dueDate = new Date(startYear, startMonth + idx * 1.5, 1 + Math.floor(Math.random() * 28));
      const dueDateStr = dueDate.toISOString().split("T")[0];
      const isPast = dueDate < new Date();
      const collected = isPast && Math.random() > 0.3;
      return { id: generateId(), name, percentage: pcts[idx], dueDate: dueDateStr, collected, collectionDate: collected ? new Date(dueDate.getTime() + Math.random() * 15 * 86400000).toISOString().split("T")[0] : "" };
    });
    projects.push({ id: generateId(), name: `${names[i % names.length]} ${loc}`, projectManager: pm.id, type, contractAmount: amount, currency, client: `Cliente ${String.fromCharCode(65 + (i % 26))}`, location: loc, milestones, notes: "" });
  }
  return projects;
}

// --- MODAL ---
const Modal = ({ isOpen, onClose, title, children, width = "max-w-2xl" }) => {
  if (!isOpen) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" onClick={onClose}>
      <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
      <div className={`relative bg-white rounded-2xl shadow-2xl ${width} w-full mx-4 max-h-[90vh] flex flex-col`} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
          <h2 className="text-lg font-semibold text-gray-900">{title}</h2>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors"><X size={20} /></button>
        </div>
        <div className="overflow-y-auto px-6 py-4 flex-1">{children}</div>
      </div>
    </div>
  );
};

// --- PROJECT CARD ---
const ProjectCard = ({ project, pms, onEdit, onDelete }) => {
  const pm = pms.find(p => p.id === project.projectManager);
  const pt = PROJECT_TYPES.find(t => t.id === project.type);
  const totalPct = project.milestones.reduce((s, m) => s + m.percentage, 0);
  const collectedPct = project.milestones.filter(m => m.collected).reduce((s, m) => s + m.percentage, 0);
  const collectedAmt = project.contractAmount * (collectedPct / 100);
  const pendingAmt = project.contractAmount - collectedAmt;
  const milestonesDone = project.milestones.filter(m => m.collected).length;
  return (
    <div className="bg-white rounded-xl border border-gray-200 hover:border-gray-300 hover:shadow-lg transition-all duration-200 overflow-hidden group">
      <div className="p-4">
        <div className="flex items-start justify-between mb-3">
          <div className="flex items-center gap-2 min-w-0">
            <div className="p-1.5 rounded-lg" style={{ backgroundColor: pt?.color + "15", color: pt?.color }}><TypeIcon type={project.type} size={18} /></div>
            <div className="min-w-0">
              <h3 className="font-semibold text-gray-900 text-sm truncate">{project.name}</h3>
              <p className="text-xs text-gray-500">{pt?.label} &middot; {project.currency}</p>
            </div>
          </div>
          <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onClick={() => onEdit(project)} className="p-1.5 rounded-lg hover:bg-blue-50 text-gray-400 hover:text-blue-600"><Edit3 size={14} /></button>
            <button onClick={() => onDelete(project.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500"><Trash2 size={14} /></button>
          </div>
        </div>
        <div className="mb-3">
          <div className="text-xl font-bold text-gray-900">{formatCurrency(project.contractAmount, project.currency)}</div>
          <div className="flex items-center gap-1 mt-0.5"><div className="w-2 h-2 rounded-full" style={{ backgroundColor: pm?.color }} /><span className="text-xs text-gray-500">{pm?.name || "Sin PM"}</span></div>
        </div>
        <div className="mb-3">
          <div className="flex justify-between text-xs mb-1"><span className="text-gray-500">Cobranza</span><span className="font-medium text-gray-700">{collectedPct.toFixed(0)}%</span></div>
          <div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full rounded-full transition-all duration-500" style={{ width: `${collectedPct}%`, backgroundColor: pm?.color }} /></div>
        </div>
        <div className="grid grid-cols-2 gap-2 text-xs">
          <div className="bg-green-50 rounded-lg p-2"><div className="text-green-600 font-medium">Cobrado</div><div className="text-green-800 font-semibold">{formatCurrency(collectedAmt, project.currency)}</div></div>
          <div className="bg-amber-50 rounded-lg p-2"><div className="text-amber-600 font-medium">Pendiente</div><div className="text-amber-800 font-semibold">{formatCurrency(pendingAmt, project.currency)}</div></div>
        </div>
        <div className="mt-3 flex items-center justify-between text-xs text-gray-500">
          <span>{milestonesDone}/{project.milestones.length} hitos</span>
          {totalPct !== 100 && <span className="text-red-500 font-medium">Hitos: {totalPct}% (debe ser 100%)</span>}
          {project.client && <span className="truncate ml-2">{project.client}</span>}
        </div>
      </div>
    </div>
  );
};

// --- PROJECT FORM ---
const ProjectForm = ({ project, pms, onSave, onCancel }) => {
  const [form, setForm] = useState(project || {
    id: generateId(), name: "", projectManager: pms[0]?.id || "", type: "pv",
    contractAmount: 0, currency: "MXN", client: "", location: "", notes: "",
    milestones: [{ id: generateId(), name: "Anticipo", percentage: 30, dueDate: "", collected: false, collectionDate: "" },
                 { id: generateId(), name: "Entrega final", percentage: 70, dueDate: "", collected: false, collectionDate: "" }],
  });
  const totalPct = form.milestones.reduce((s, m) => s + (parseFloat(m.percentage) || 0), 0);
  const updateMilestone = (idx, field, value) => {
    const ms = [...form.milestones];
    ms[idx] = { ...ms[idx], [field]: field === "percentage" ? parseFloat(value) || 0 : value };
    if (field === "collected" && !value) ms[idx].collectionDate = "";
    setForm({ ...form, milestones: ms });
  };
  const addMilestone = () => { if (form.milestones.length >= 10) return; setForm({ ...form, milestones: [...form.milestones, { id: generateId(), name: "", percentage: 0, dueDate: "", collected: false, collectionDate: "" }] }); };
  const removeMilestone = (idx) => { if (form.milestones.length <= 1) return; setForm({ ...form, milestones: form.milestones.filter((_, i) => i !== idx) }); };
  const isValid = form.name && form.contractAmount > 0 && form.milestones.length > 0 && form.milestones.every(m => m.name && m.dueDate);
  return (
    <div className="space-y-5">
      <div className="grid grid-cols-2 gap-4">
        <div className="col-span-2">
          <label className="block text-xs font-medium text-gray-600 mb-1">Nombre del proyecto</label>
          <input type="text" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Ej: Parque Solar Sonora" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500" />
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Project Manager</label>
          <select value={form.projectManager} onChange={e => setForm({ ...form, projectManager: e.target.value })} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
            {pms.map(pm => <option key={pm.id} value={pm.id}>{pm.name}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Tipo de proyecto</label>
          <select value={form.type} onChange={e => setForm({ ...form, type: e.target.value })} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
            {PROJECT_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Monto del contrato (sin IVA)</label>
          <input type="number" value={form.contractAmount || ""} onChange={e => setForm({ ...form, contractAmount: parseFloat(e.target.value) || 0 })} placeholder="0" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500" />
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Moneda</label>
          <select value={form.currency} onChange={e => setForm({ ...form, currency: e.target.value })} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
            {CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Cliente</label>
          <input type="text" value={form.client} onChange={e => setForm({ ...form, client: e.target.value })} placeholder="Nombre del cliente" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500" />
        </div>
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">Ubicación</label>
          <input type="text" value={form.location} onChange={e => setForm({ ...form, location: e.target.value })} placeholder="Estado o ciudad" className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500" />
        </div>
      </div>
      <div>
        <div className="flex items-center justify-between mb-3">
          <div>
            <label className="block text-xs font-medium text-gray-600">Hitos de cobranza</label>
            <span className={`text-xs ${Math.abs(totalPct - 100) < 0.01 ? "text-green-600" : "text-red-500"} font-medium`}>Total: {totalPct.toFixed(1)}% {Math.abs(totalPct - 100) < 0.01 ? "✓" : "(debe sumar 100%)"}</span>
          </div>
          {form.milestones.length < 10 && <button onClick={addMilestone} className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100 transition-colors"><Plus size={14} /> Agregar hito</button>}
        </div>
        <div className="space-y-2 max-h-64 overflow-y-auto pr-1">
          {form.milestones.map((m, idx) => (
            <div key={m.id} className="flex items-center gap-2 p-2.5 bg-gray-50 rounded-lg border border-gray-100">
              <span className="text-xs font-medium text-gray-400 w-5">{idx + 1}</span>
              <input type="text" value={m.name} onChange={e => updateMilestone(idx, "name", e.target.value)} placeholder="Nombre del hito" className="flex-1 min-w-0 px-2 py-1.5 border border-gray-200 rounded text-xs bg-white focus:outline-none focus:ring-1 focus:ring-blue-500/30" />
              <div className="flex items-center gap-0.5"><input type="number" value={m.percentage || ""} onChange={e => updateMilestone(idx, "percentage", e.target.value)} className="w-14 px-2 py-1.5 border border-gray-200 rounded text-xs text-right bg-white focus:outline-none focus:ring-1 focus:ring-blue-500/30" min="0" max="100" step="0.5" /><span className="text-xs text-gray-400">%</span></div>
              <input type="date" value={m.dueDate} onChange={e => updateMilestone(idx, "dueDate", e.target.value)} className="px-2 py-1.5 border border-gray-200 rounded text-xs bg-white focus:outline-none focus:ring-1 focus:ring-blue-500/30" />
              <label className="flex items-center gap-1 cursor-pointer select-none"><input type="checkbox" checked={m.collected} onChange={e => updateMilestone(idx, "collected", e.target.checked)} className="rounded border-gray-300 text-green-600 focus:ring-green-500/20" /><span className="text-xs text-gray-500">Cobrado</span></label>
              {m.collected && <input type="date" value={m.collectionDate} onChange={e => updateMilestone(idx, "collectionDate", e.target.value)} className="px-2 py-1.5 border border-gray-200 rounded text-xs bg-white focus:outline-none focus:ring-1 focus:ring-blue-500/30" title="Fecha real de cobro" />}
              <button onClick={() => removeMilestone(idx)} className="p-1 rounded hover:bg-red-50 text-gray-300 hover:text-red-500 transition-colors" disabled={form.milestones.length <= 1}><Trash2 size={14} /></button>
            </div>
          ))}
        </div>
      </div>
      <div>
        <label className="block text-xs font-medium text-gray-600 mb-1">Notas</label>
        <textarea value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} rows={2} placeholder="Observaciones del proyecto..." className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 resize-none" />
      </div>
      <div className="flex justify-end gap-2 pt-2 border-t border-gray-100">
        <button onClick={onCancel} className="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">Cancelar</button>
        <button onClick={() => onSave(form)} disabled={!isValid} className={`px-4 py-2 text-sm font-medium rounded-lg transition-colors ${isValid ? "bg-blue-600 text-white hover:bg-blue-700" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}><div className="flex items-center gap-1.5"><Save size={14} /> Guardar proyecto</div></button>
      </div>
    </div>
  );
};

// --- FLOW TABLE ---
const FlowTable = ({ data, groupBy, showIVA, displayCurrency, exchangeRate }) => {
  if (!data || data.length === 0) return <div className="text-center py-12 text-gray-400">No hay datos para mostrar con los filtros seleccionados</div>;
  const grouped = useMemo(() => {
    const map = {};
    data.forEach(item => {
      let key;
      const d = new Date(item.date + "T12:00:00");
      if (groupBy === "day") key = item.date;
      else if (groupBy === "week") { const w = parseWeek(item.date); key = `${d.getFullYear()}-S${String(w).padStart(2, "0")}`; }
      else if (groupBy === "month") key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      else key = `${d.getFullYear()}`;
      if (!map[key]) map[key] = { key, collected: 0, pending: 0, total: 0, items: [] };
      let amt = showIVA ? item.amount * (1 + IVA_RATE) : item.amount;
      if (displayCurrency === "MXN" && item.currency === "USD") amt *= exchangeRate;
      else if (displayCurrency === "USD" && item.currency === "MXN") amt /= exchangeRate;
      if (item.collected) map[key].collected += amt; else map[key].pending += amt;
      map[key].total += amt;
      map[key].items.push(item);
    });
    return Object.values(map).sort((a, b) => a.key.localeCompare(b.key));
  }, [data, groupBy, showIVA, displayCurrency, exchangeRate]);
  const grandCollected = grouped.reduce((s, g) => s + g.collected, 0);
  const grandPending = grouped.reduce((s, g) => s + g.pending, 0);
  const grandTotal = grouped.reduce((s, g) => s + g.total, 0);
  const periodLabel = { day: "Día", week: "Semana", month: "Mes", year: "Año" }[groupBy];
  return (
    <div className="overflow-x-auto">
      <table className="w-full text-sm">
        <thead><tr className="bg-gray-50 border-b border-gray-200">
          <th className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">{periodLabel}</th>
          <th className="text-right px-4 py-3 text-xs font-semibold text-green-600 uppercase tracking-wider">Cobrado</th>
          <th className="text-right px-4 py-3 text-xs font-semibold text-amber-600 uppercase tracking-wider">Pendiente</th>
          <th className="text-right px-4 py-3 text-xs font-semibold text-gray-700 uppercase tracking-wider">Total</th>
          <th className="text-center px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Hitos</th>
        </tr></thead>
        <tbody>{grouped.map((g, idx) => (
          <tr key={g.key} className={`border-b border-gray-100 hover:bg-blue-50/30 transition-colors ${idx % 2 === 0 ? "bg-white" : "bg-gray-50/50"}`}>
            <td className="px-4 py-2.5 font-medium text-gray-800">{g.key}</td>
            <td className="px-4 py-2.5 text-right text-green-700 font-medium">{formatCurrency(g.collected, displayCurrency)}</td>
            <td className="px-4 py-2.5 text-right text-amber-700 font-medium">{formatCurrency(g.pending, displayCurrency)}</td>
            <td className="px-4 py-2.5 text-right text-gray-900 font-semibold">{formatCurrency(g.total, displayCurrency)}</td>
            <td className="px-4 py-2.5 text-center text-gray-500">{g.items.length}</td>
          </tr>
        ))}</tbody>
        <tfoot><tr className="bg-gray-800 text-white font-semibold">
          <td className="px-4 py-3 rounded-bl-lg">TOTAL</td>
          <td className="px-4 py-3 text-right text-green-300">{formatCurrency(grandCollected, displayCurrency)}</td>
          <td className="px-4 py-3 text-right text-amber-300">{formatCurrency(grandPending, displayCurrency)}</td>
          <td className="px-4 py-3 text-right">{formatCurrency(grandTotal, displayCurrency)}</td>
          <td className="px-4 py-3 text-center rounded-br-lg">{data.length}</td>
        </tr></tfoot>
      </table>
    </div>
  );
};

// ===================== MAIN APP =====================
function App() {

  // Guardar en SharePoint cuando cambian los datos
  useEffect(() => {
    if (!appReady || authError) return;
    setSaveStatus("saving");
    const t = setTimeout(() => {
      window.__spSave({ projectManagers, exchangeRate, projects })
        .then(() => { setSaveStatus("saved"); setTimeout(() => setSaveStatus(""), 2500); })
        .catch(() => setSaveStatus("error"));
    }, 1000);
    return () => clearTimeout(t);
  }, [projectManagers, exchangeRate, projects, appReady]);
  if (!appReady) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div style={{fontSize:52}}>⚡</div>
      <div style={{fontSize:20,fontWeight:700,color:"#2563EB"}}>Skysense | Control de Cobranza</div>
      <div style={{color:"#6B7280",fontSize:14}}>Conectando con Microsoft 365…</div>
      {authError && <div style={{background:"#FEF2F2",color:"#DC2626",padding:"16px 24px",borderRadius:12,fontSize:13,maxWidth:480,textAlign:"center",marginTop:8}}>
        <strong>⚠️ {authError}</strong><br/>
        <small style={{color:"#9CA3AF"}}>Los datos de muestra están disponibles. Verifica AZURE_CONFIG.</small>
      </div>}
    </div>
  );

    const [cardsPM, setCardsPM] = useState("all");
  const [settingsOpen, setSettingsOpen] = useState(false);

  // Settings state for editing
  const [editPMs, setEditPMs] = useState(null);
  const [editRate, setEditRate] = useState(exchangeRate);

  const openSettings = () => { setEditPMs(projectManagers.map(pm => ({ ...pm }))); setEditRate(exchangeRate); setSettingsOpen(true); };
  const saveSettings = () => {
    const validPMs = editPMs.filter(pm => pm.name.trim());
    setProjectManagers(validPMs);
    setExchangeRate(editRate);
    setSettingsOpen(false);
  };
  const addPM = () => { setEditPMs([...editPMs, { id: generateId(), name: "", color: PRESET_COLORS[editPMs.length % PRESET_COLORS.length] }]); };
  const removePM = (idx) => { if (editPMs.length <= 1) return; setEditPMs(editPMs.filter((_, i) => i !== idx)); };
  const updatePM = (idx, field, value) => { const next = [...editPMs]; next[idx] = { ...next[idx], [field]: value }; setEditPMs(next); };

  const handleSaveProject = (proj) => {
    setProjects(prev => { const idx = prev.findIndex(p => p.id === proj.id); if (idx >= 0) { const next = [...prev]; next[idx] = proj; return next; } return [...prev, proj]; });
    setModalOpen(false); setEditingProject(null);
  };
  const handleDeleteProject = (id) => setProjects(prev => prev.filter(p => p.id !== id));
  const handleEditProject = (proj) => { setEditingProject(proj); setModalOpen(true); };

  // Convert amount to display currency
  const toDisplay = (amount, fromCurrency) => {
    if (fromCurrency === displayCurrency) return amount;
    if (displayCurrency === "MXN" && fromCurrency === "USD") return amount * exchangeRate;
    if (displayCurrency === "USD" && fromCurrency === "MXN") return amount / exchangeRate;
    return amount;
  };

  // Flatten milestones
  const flowData = useMemo(() => {
    const items = [];
    projects.forEach(proj => {
      if (filterPM !== "all" && proj.projectManager !== filterPM) return;
      if (filterType !== "all" && proj.type !== filterType) return;
      proj.milestones.forEach(m => {
        if (filterStatus === "collected" && !m.collected) return;
        if (filterStatus === "pending" && m.collected) return;
        const date = m.collected && m.collectionDate ? m.collectionDate : m.dueDate;
        if (!date) return;
        items.push({ date, amount: proj.contractAmount * (m.percentage / 100), collected: m.collected, projectName: proj.name, milestoneName: m.name, percentage: m.percentage, projectManager: proj.projectManager, type: proj.type, currency: proj.currency });
      });
    });
    return items.sort((a, b) => a.date.localeCompare(b.date));
  }, [projects, filterPM, filterType, filterStatus]);

  const chartData = useMemo(() => {
    const map = {};
    flowData.forEach(item => {
      const d = new Date(item.date + "T12:00:00");
      let key;
      if (groupBy === "day") key = item.date;
      else if (groupBy === "week") { const w = parseWeek(item.date); key = `${d.getFullYear()}-S${String(w).padStart(2, "0")}`; }
      else if (groupBy === "month") key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      else key = `${d.getFullYear()}`;
      if (!map[key]) map[key] = { period: key, cobrado: 0, pendiente: 0 };
      let amt = showIVA ? item.amount * (1 + IVA_RATE) : item.amount;
      amt = toDisplay(amt, item.currency);
      if (item.collected) map[key].cobrado += amt; else map[key].pendiente += amt;
    });
    return Object.values(map).sort((a, b) => a.period.localeCompare(b.period));
  }, [flowData, groupBy, showIVA, displayCurrency, exchangeRate]);

  // KPIs (consolidated in display currency)
  const kpis = useMemo(() => {
    const totalContract = projects.reduce((s, p) => s + toDisplay(p.contractAmount, p.currency), 0);
    let totalCollected = 0, totalPending = 0;
    projects.forEach(p => p.milestones.forEach(m => {
      const amt = toDisplay(p.contractAmount * (m.percentage / 100), p.currency);
      if (m.collected) totalCollected += amt; else totalPending += amt;

      return { ...pm, projects: pmProjects.length, collected, pending, total: collected + pending };

  const filteredCardsProjects = projects.filter(p => {

    return true;

  // CSV Export
  const exportToCSV = () => {
    const toCSV = (headers, rows) => { const esc = v => `"${String(v ?? "").replace(/"/g, '""')}"`; return [headers.map(esc).join(","), ...rows.map(r => r.map(esc).join(","))].join("\n"); };
    const dl = (content, filename) => { const blob = new Blob(["\uFEFF" + content], { type: "text/csv;charset=utf-8;" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url); };
    const date = new Date().toISOString().split("T")[0];
    const projRows = projects.map(p => { const pm = projectManagers.find(x => x.id === p.projectManager); const pt = PROJECT_TYPES.find(x => x.id === p.type); const col = p.milestones.filter(m => m.collected).reduce((s, m) => s + p.contractAmount * (m.percentage / 100), 0); return [p.name, pm?.name, pt?.label, p.client, p.location, p.currency, p.contractAmount, (p.contractAmount * (1 + IVA_RATE)).toFixed(2), col.toFixed(2), (col * (1 + IVA_RATE)).toFixed(2), (p.contractAmount - col).toFixed(2), ((p.contractAmount - col) * (1 + IVA_RATE)).toFixed(2), (col / p.contractAmount * 100).toFixed(1) + "%", p.milestones.length]; });
    dl(toCSV(["Proyecto","PM","Tipo","Cliente","Ubicación","Moneda","Monto sin IVA","Monto con IVA","Cobrado sin IVA","Cobrado con IVA","Pendiente sin IVA","Pendiente con IVA","% Cobranza","Hitos"], projRows), `Skysense_Proyectos_${date}.csv`);
    const msRows = []; projects.forEach(p => { const pm = projectManagers.find(x => x.id === p.projectManager); p.milestones.forEach(m => { const amt = p.contractAmount * (m.percentage / 100); msRows.push([p.name, pm?.name, p.currency, m.name, m.percentage, amt.toFixed(2), (amt * (1 + IVA_RATE)).toFixed(2), m.dueDate, m.collected ? "Sí" : "No", m.collectionDate || ""]); }); });
    setTimeout(() => dl(toCSV(["Proyecto","PM","Moneda","Hito","% Contrato","Monto sin IVA","Monto con IVA","Fecha Programada","Cobrado","Fecha Cobro"], msRows), `Skysense_Hitos_${date}.csv`), 300);
    const flowRows = chartData.map(r => [r.period, r.cobrado.toFixed(2), (r.cobrado * (1 + IVA_RATE)).toFixed(2), r.pendiente.toFixed(2), (r.pendiente * (1 + IVA_RATE)).toFixed(2), (r.cobrado + r.pendiente).toFixed(2), ((r.cobrado + r.pendiente) * (1 + IVA_RATE)).toFixed(2)]);
    setTimeout(() => dl(toCSV(["Periodo","Cobrado sin IVA","Cobrado con IVA","Pendiente sin IVA","Pendiente con IVA","Total sin IVA","Total con IVA"], flowRows), `Skysense_Flujo_${date}.csv`), 600);
  };

  // JSON export/import

  };
  const importJSON = (e) => {

      ["Sistema BESS Monterrey","bess","8000000","MXN","Cliente B","Nuevo León","Anticipo","25","2025-07-01","Sí","2025-07-10"],

    const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "plantilla_carga_masiva_skysense.csv"; a.click(); URL.revokeObjectURL(url);
  };

  const parseBulkCSV = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    Papa.parse(file, {
      header: true, skipEmptyLines: true, encoding: "UTF-8",
      complete: (results) => {
        const errors = []; const projectMap = {};
        results.data.forEach((row, idx) => {
          const ln = idx + 2;
          const projName = (row["Proyecto"] || "").trim();
          const tipo = (row["Tipo (pv/bess/hybrid/microgrid)"] || "").trim().toLowerCase();
          const montoStr = (row["Monto Contrato (sin IVA)"] || "").trim();
          const moneda = (row["Moneda (MXN/USD)"] || "MXN").trim().toUpperCase();
          const cliente = (row["Cliente"] || "").trim();
          const ubicacion = (row["Ubicación"] || row["Ubicacion"] || "").trim();
          const hito = (row["Hito"] || "").trim();
          const pctStr = (row["Porcentaje (%)"] || "").trim();
          const fecha = (row["Fecha Programada (YYYY-MM-DD)"] || "").trim();
          const cobrado = (row["Cobrado (Sí/No)"] || row["Cobrado (Si/No)"] || "").trim().toLowerCase();
          const fechaCobro = (row["Fecha de Cobro (YYYY-MM-DD)"] || "").trim();
          if (!projName) { errors.push(`Fila ${ln}: Nombre vacío`); return; }
          if (!["pv","bess","hybrid","microgrid"].includes(tipo)) { errors.push(`Fila ${ln}: Tipo "${tipo}" no válido`); return; }
          const monto = parseFloat(montoStr.replace(/,/g, ""));
          if (isNaN(monto) || monto <= 0) { errors.push(`Fila ${ln}: Monto no válido`); return; }
          if (!["MXN","USD"].includes(moneda)) { errors.push(`Fila ${ln}: Moneda no válida`); return; }
          if (!hito) { errors.push(`Fila ${ln}: Hito vacío`); return; }
          const pct = parseFloat(pctStr);
          if (isNaN(pct) || pct <= 0 || pct > 100) { errors.push(`Fila ${ln}: Porcentaje no válido`); return; }
          if (!fecha || !/^\d{4}-\d{2}-\d{2}$/.test(fecha)) { errors.push(`Fila ${ln}: Fecha debe ser YYYY-MM-DD`); return; }
          const key = `${projName}__${moneda}`;
          if (!projectMap[key]) projectMap[key] = { id: generateId(), name: projName, projectManager: bulkPM, type: tipo, contractAmount: monto, currency: moneda, client: cliente, location: ubicacion, notes: "", milestones: [] };
          projectMap[key].milestones.push({ id: generateId(), name: hito, percentage: pct, dueDate: fecha, collected: ["sí","si","yes","1","true"].includes(cobrado), collectionDate: fechaCobro || "" });
        });
        Object.values(projectMap).forEach(proj => {
          const tot = proj.milestones.reduce((s, m) => s + m.percentage, 0);
          if (Math.abs(tot - 100) > 0.5) errors.push(`"${proj.name}": hitos suman ${tot.toFixed(1)}% (debe ser 100%)`);
          if (proj.milestones.length > 10) errors.push(`"${proj.name}": ${proj.milestones.length} hitos (máx 10)`);
        });
        setBulkPreview(Object.values(projectMap)); setBulkErrors(errors);
      },
      error: (err) => setBulkErrors([`Error: ${err.message}`])
    });
    e.target.value = "";
  };

  const confirmBulkImport = (mode) => {
    if (!bulkPreview) return;
    if (mode === "replace") setProjects(prev => [...prev.filter(p => p.projectManager !== bulkPM), ...bulkPreview]);
    else setProjects(prev => [...prev, ...bulkPreview]);

  };

  // ===================== RENDER =====================
  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <div className="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div className="max-w-[1600px] mx-auto px-6 py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="bg-gradient-to-br from-blue-600 to-blue-700 text-white p-2 rounded-xl"><Zap size={22} /></div>
              <div>
                <h1 className="text-lg font-bold text-gray-900">Skysense <span className="text-blue-600">| Control de Cobranza</span></h1>
                <p className="text-xs text-gray-500">TC: $1 USD = ${exchangeRate.toFixed(2)} MXN</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <div className="flex bg-gray-100 rounded-lg p-0.5 mr-4">
                {[
                  { id: "dashboard", label: "Dashboard", icon: <BarChart3 size={14} /> },
                  { id: "projects", label: "Proyectos", icon: <FolderOpen size={14} /> },
                  { id: "flow", label: "Flujo de Ingresos", icon: <TrendingUp size={14} /> },
                ].map(tab => (
                  <button key={tab.id} onClick={() => setView(tab.id)} className={`flex items-center gap-1.5 px-3.5 py-1.5 text-xs font-medium rounded-md transition-all ${view === tab.id ? "bg-white text-blue-600 shadow-sm" : "text-gray-500 hover:text-gray-700"}`}>{tab.icon} {tab.label}</button>
                ))}
              </div>
              <button onClick={() => { setEditingProject(null); setModalOpen(true); }} className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-xs font-medium rounded-lg hover:bg-blue-700 transition-colors"><Plus size={14} /> Nuevo</button>
              <button onClick={() => setBulkModalOpen(true)} className="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-600 text-white text-xs font-medium rounded-lg hover:bg-emerald-700 transition-colors"><FileUp size={14} /> Carga masiva</button>
              <button onClick={openSettings} className="flex items-center gap-1.5 px-3 py-1.5 text-gray-600 bg-gray-100 text-xs font-medium rounded-lg hover:bg-gray-200 transition-colors"><Settings size={14} /> Config</button>

          {bulkErrors.length > 0 && (
            <div className="bg-red-50 border border-red-200 rounded-xl p-4">
              <h4 className="text-sm font-semibold text-red-800 mb-2 flex items-center gap-2"><AlertTriangle size={16} /> Errores ({bulkErrors.length})</h4>
              <div className="max-h-40 overflow-y-auto space-y-1">{bulkErrors.map((e, i) => <p key={i} className="text-xs text-red-700">{e}</p>)}</div>
            </div>
          )}
          {bulkPreview && bulkPreview.length > 0 && (
            <div>
              <h4 className="text-sm font-semibold text-gray-800 mb-3 flex items-center gap-2"><Check size={16} className="text-green-600" /> Vista previa: {bulkPreview.length} proyectos</h4>
              <div className="max-h-60 overflow-y-auto border border-gray-200 rounded-xl">
                <table className="w-full text-xs">
                  <thead className="sticky top-0 bg-gray-50"><tr className="border-b border-gray-200">
                    <th className="text-left px-3 py-2 font-semibold text-gray-500">Proyecto</th><th className="text-center px-3 py-2 font-semibold text-gray-500">Tipo</th><th className="text-right px-3 py-2 font-semibold text-gray-500">Monto</th><th className="text-center px-3 py-2 font-semibold text-gray-500">Moneda</th><th className="text-center px-3 py-2 font-semibold text-gray-500">Hitos</th><th className="text-center px-3 py-2 font-semibold text-gray-500">% Total</th>
                  </tr></thead>
                  <tbody>{bulkPreview.map(p => { const tot = p.milestones.reduce((s, m) => s + m.percentage, 0); const pt = PROJECT_TYPES.find(t => t.id === p.type); return (
                    <tr key={p.id} className="border-b border-gray-50 hover:bg-gray-50">
                      <td className="px-3 py-2 font-medium text-gray-800">{p.name}</td>
                      <td className="px-3 py-2 text-center"><span className="px-2 py-0.5 rounded-full text-xs" style={{ backgroundColor: pt?.color + "20", color: pt?.color }}>{pt?.label}</span></td>
                      <td className="px-3 py-2 text-right font-medium">{formatCurrency(p.contractAmount, p.currency)}</td>
                      <td className="px-3 py-2 text-center">{p.currency}</td>
                      <td className="px-3 py-2 text-center">{p.milestones.length}</td>
                      <td className={`px-3 py-2 text-center font-medium ${Math.abs(tot - 100) < 0.5 ? "text-green-600" : "text-red-500"}`}>{tot.toFixed(1)}%</td>
                    </tr>); })}</tbody>
                </table>
              </div>
              <div className="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                <p className="text-xs text-gray-500">PM: <strong>{projectManagers.find(p => p.id === bulkPM)?.name}</strong></p>
                <div className="flex gap-2">
                  <button onClick={() => confirmBulkImport("add")} className="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"><div className="flex items-center gap-1.5"><Plus size={14} /> Agregar a existentes</div></button>
                  <button onClick={() => confirmBulkImport("replace")} className="px-4 py-2 text-sm font-medium bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition-colors"><div className="flex items-center gap-1.5"><Upload size={14} /> Reemplazar proyectos de este PM</div></button>
                </div>
              </div>
            </div>
          )}
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
