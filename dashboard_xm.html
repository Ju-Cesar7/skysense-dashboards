<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skysense · XMs — P$250M Credit Facility</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0A0F1E;--sur:#111827;--sur2:#1a2235;--brd:#1E2D45;
  --acc:#10B981;--acc2:#3B82F6;--acc3:#EF4444;--acc4:#F59E0B;--acc5:#8B5CF6;
  --txt:#F1F5F9;--dim:#64748B;--mid:#94A3B8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;line-height:1.5;overflow-x:hidden;}
.syne{font-family:'Syne',sans-serif;text-transform:uppercase;}
.mono{font-family:'DM Mono',monospace;letter-spacing:-0.5px;}

/* Layout */
.app{display:flex;flex-direction:column;min-height:100vh;}
header{padding:24px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd);background:rgba(10,15,30,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;}
main{padding:40px;max-width:1400px;margin:0 auto;width:100%;flex:1;}

.grid{display:grid;gap:24px;margin-bottom:24px;}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:16px;padding:24px;position:relative;overflow:hidden;}

/* Botones */
.btn{padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:8px;transition:0.2s;font-size:14px;}
.btn-primary{background:var(--acc2);color:white;}
.btn-primary:hover{background:#2563EB;transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--brd);color:var(--mid);}
.btn-outline:hover{border-color:var(--acc2);color:var(--txt);}

/* Inputs */
input,select,textarea{width:100%;background:var(--sur2);border:1px solid var(--brd);padding:12px;border-radius:8px;color:var(--txt);font-size:14px;margin-top:6px;}
label{font-size:12px;color:var(--dim);text-transform:uppercase;font-weight:700;}

/* Table */
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{text-align:left;padding:12px;border-bottom:2px solid var(--brd);color:var(--dim);font-size:11px;text-transform:uppercase;}
td{padding:16px 12px;border-bottom:1px solid var(--brd);font-size:14px;}
tr:hover td{background:rgba(255,255,255,0.02);}

/* Modales */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-content{background:var(--sur);border:1px solid var(--brd);width:90%;max-width:700px;border-radius:20px;padding:32px;max-height:90vh;overflow-y:auto;}

.badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;}
.st-Activo{background:rgba(16,185,129,0.1);color:var(--acc);}
.st-Pipeline{background:rgba(139,92,246,0.1);color:var(--acc5);}
.st-Construccion{background:rgba(245,158,11,0.1);color:var(--acc4);}
.st-Cerrado{background:rgba(239,68,68,0.1);color:var(--acc3);}
</style>
</head>
<body>

<div class="app">
  <header>
    <div style="display:flex;align-items:center;gap:16px">
      <div style="width:40px;height:40px;background:linear-gradient(45deg,var(--acc2),var(--acc5));border-radius:10px"></div>
      <div>
        <h1 class="syne" style="font-size:1.2rem;letter-spacing:1px">Skysense · XMs</h1>
        <p class="mono" style="font-size:10px;color:var(--dim)">CREDIT FACILITY MANAGEMENT • <span id="hdate"></span></p>
      </div>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-outline" onclick="exportExcel()">📊 Exportar Detalle</button>
      <button class="btn btn-primary" onclick="openModal('m-add')">+ Nuevo Proyecto</button>
    </div>
  </header>

  <main>
    <div id="project-list" class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 class="syne" style="font-size:1rem">Portafolio de Proyectos</h2>
        <div id="stats-summary" class="mono" style="font-size:12px;color:var(--acc2)"></div>
      </div>
      <div style="overflow-x:auto">
        <table id="main-table">
          <thead>
            <tr>
              <th>Proyecto</th>
              <th>Estatus</th>
              <th>Inversión</th>
              <th>Mensualidades</th>
              <th>Hitos Ok</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="p-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="m-edit" class="modal">
  <div class="modal-content">
    <h2 class="syne" style="margin-bottom:24px;color:var(--acc2)">Actualizar Cobranza XM</h2>
    <div id="edit-body"></div>
    <div style="display:flex;gap:12px;margin-top:30px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal('m-edit')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProyecto()">💾 Guardar Cambios</button>
    </div>
  </div>
</div>

<script>
// VARIABLES GLOBALES
let projects = [];
const fmt = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v);

// ═══════════════════════════════════════════════════════
// UI LOGIC
// ═══════════════════════════════════════════════════════

function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

function refresh() {
  const tbody = document.getElementById('p-body');
  tbody.innerHTML = '';
  
  projects.forEach((p, i) => {
    // Calcular hitos pagados
    const pagados = p.hitos ? p.hitos.filter(h => h.cobrado).length : 0;
    const totalHitos = p.hitos ? p.hitos.length : 0;
    
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600">${p.nombre}</td>
      <td><span class="badge st-${p.status.replace(' ','')}">${p.status}</span></td>
      <td class="mono">${fmt(p.inversion)}</td>
      <td style="text-align:center">${p.mensualidades}</td>
      <td class="mono" style="color:var(--acc)">${pagados}/${totalHitos}</td>
      <td>
        <button class="btn btn-outline" style="padding:6px 10px" onclick="editProyecto(${i})">✏️ Finanzas</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function editProyecto(i) {
  const p = projects[i];
  const body = document.getElementById('edit-body');

  // Inicializar hitos si no existen
  const numMensualidades = parseInt(p.mensualidades) || 0;
  if (!p.hitos || p.hitos.length !== numMensualidades) {
    p.hitos = Array.from({ length: numMensualidades }, (_, index) => ({
      num: index + 1,
      fechaProgramada: '',
      cobrado: false,
      monto: 0,
      fechaCobro: ''
    }));
  }

  body.innerHTML = `
    <div class="grid" style="grid-template-columns: 1fr 1fr; gap:15px">
      <div>
        <label>Nombre del Proyecto</label>
        <input type="text" id="e-nombre" value="${p.nombre}">
      </div>
      <div>
        <label>Estatus</label>
        <select id="e-status">
          <option value="Pipeline" ${p.status==='Pipeline'?'selected':''}>Pipeline</option>
          <option value="En Construcción" ${p.status==='En Construcción'?'selected':''}>En Construcción</option>
          <option value="Activo" ${p.status==='Activo'?'selected':''}>Activo</option>
          <option value="Cerrado" ${p.status==='Cerrado'?'selected':''}>Cerrado</option>
        </select>
      </div>
      <div>
        <label>Fecha Firma Contrato</label>
        <input type="date" id="e-firma" value="${p.fechaFirma || ''}">
      </div>
      <div>
        <label>Anticipo ($)</label>
        <input type="number" id="e-anticipo" value="${p.anticipo || 0}">
      </div>
    </div>

    <h3 class="syne" style="margin:25px 0 15px 0; font-size:0.9rem; color:var(--acc4); border-bottom: 1px solid var(--brd); padding-bottom:5px">Hitos de Cobranza (Mensualidades)</h3>
    <div id="hitos-container" style="max-height:350px; overflow-y:auto; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; border:1px solid var(--brd)">
      ${p.hitos.map((h, idx) => `
        <div style="display:grid; grid-template-columns: 40px 1fr 1fr 1fr 40px; gap:10px; margin-bottom:12px; align-items:end; padding-bottom:12px; border-bottom:1px solid var(--sur2)">
          <div class="mono" style="font-size:12px; color:var(--dim)">M${h.num}</div>
          <div>
            <label style="font-size:9px">Prog. Pago</label>
            <input type="date" class="h-prog" data-idx="${idx}" value="${h.fechaProgramada}" style="padding:6px; font-size:12px">
          </div>
          <div>
            <label style="font-size:9px">Monto ($)</label>
            <input type="number" class="h-monto" data-idx="${idx}" value="${h.monto}" style="padding:6px; font-size:12px">
          </div>
          <div>
            <label style="font-size:9px">Fecha Cobro</label>
            <input type="date" class="h-cobro-f" data-idx="${idx}" value="${h.fechaCobro}" style="padding:6px; font-size:12px">
          </div>
          <div style="text-align:center">
            <label style="font-size:9px">Ok</label><br>
            <input type="checkbox" class="h-ok" data-idx="${idx}" ${h.cobrado ? 'checked' : ''} style="width:18px; height:18px; margin-top:8px">
          </div>
        </div>
      `).join('')}
    </div>
    <input type="hidden" id="edit-idx" value="${i}">
  `;
  openModal('m-edit');
}

function saveProyecto() {
  const i = document.getElementById('edit-idx').value;
  const p = projects[i];

  p.nombre = document.getElementById('e-nombre').value;
  p.status = document.getElementById('e-status').value;
  p.fechaFirma = document.getElementById('e-firma').value;
  p.anticipo = parseFloat(document.getElementById('e-anticipo').value) || 0;

  // Guardar datos de Hitos
  const hProgs = document.querySelectorAll('.h-prog');
  const hMontos = document.querySelectorAll('.h-monto');
  const hCobrosF = document.querySelectorAll('.h-cobro-f');
  const hOks = document.querySelectorAll('.h-ok');

  p.hitos = Array.from(hProgs).map((el, idx) => ({
    num: idx + 1,
    fechaProgramada: el.value,
    monto: parseFloat(hMontos[idx].value) || 0,
    fechaCobro: hCobrosF[idx].value,
    cobrado: hOks[idx].checked
  }));

  closeModal('m-edit');
  refresh();
  
  // Si tienes la función saveCloud() habilitada para Google Sheets:
  if (typeof saveCloud === "function") {
    saveCloud();
  }
}

function exportExcel() {
  if (projects.length === 0) return alert("No hay datos para exportar");

  const data = projects.map(p => {
    // Datos base
    const row = {
      "Proyecto": p.nombre,
      "Estatus": p.status,
      "Inversión Total": p.inversion,
      "Firma Contrato": p.fechaFirma || '',
      "Monto Anticipo": p.anticipo || 0,
      "Num. Mensualidades": p.mensualidades
    };

    // Columnas dinámicas de hitos
    if (p.hitos) {
      p.hitos.forEach((h, idx) => {
        row[`M${h.num} - Fecha Prog.`] = h.fechaProgramada;
        row[`M${h.num} - Monto`] = h.monto;
        row[`M${h.num} - Fecha Cobro Real`] = h.fechaCobro;
        row[`M${h.num} - ¿Cobrado?`] = h.cobrado ? 'SÍ' : 'NO';
      });
    }
    return row;
  });

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Control_Financiero_XM");
  XLSX.writeFile(wb, `Skysense_XM_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ═══════════════════════════════════════════════════════
// INIT Y MOCK DATA (Solo si no viene de Sheets)
// ═══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('hdate').textContent = new Date().toLocaleDateString();
  
  // Aquí cargarías tus datos reales de Google Sheets. 
  // Ejemplo inicial para que veas la funcionalidad:
  if (projects.length === 0) {
    projects = [
      { nombre: 'Sky Tower A', status: 'Activo', inversion: 12500000, mensualidades: 12, fechaFirma: '2025-01-10', anticipo: 500000, hitos: [] },
      { nombre: 'Solar Park Beta', status: 'Pipeline', inversion: 8400000, mensualidades: 6, hitos: [] }
    ];
  }
  refresh();
});
</script>

</body>
</html>
