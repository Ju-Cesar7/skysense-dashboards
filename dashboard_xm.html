<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skysense · XMs — P$250M Credit Facility</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0A0F1E;--sur:#111827;--sur2:#1a2235;--brd:#1E2D45;
  --acc:#10B981;--acc2:#3B82F6;--acc3:#EF4444;--acc4:#F59E0B;--acc5:#8B5CF6;
  --txt:#F1F5F9;--dim:#64748B;--mid:#94A3B8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;line-height:1.5;overflow-x:hidden;}
.syne{font-family:'Syne',sans-serif;text-transform:uppercase;}
.mono{font-family:'DM Mono',monospace;letter-spacing:-0.5px;}

/* Layout principal */
header{padding:24px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd);background:rgba(10,15,30,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;}
main{padding:40px;max-width:1400px;margin:0 auto;width:100%;}
.grid{display:grid;gap:24px;margin-bottom:24px;}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:16px;padding:24px;position:relative;}

/* Estilos de Tabla */
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:12px;border-bottom:2px solid var(--brd);color:var(--dim);font-size:11px;text-transform:uppercase;}
td{padding:14px 12px;border-bottom:1px solid var(--brd);font-size:13px;}

/* Badges de Estatus */
.badge{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;}
.st-Activo{background:rgba(16,185,129,0.1);color:var(--acc);}
.st-Pipeline{background:rgba(139,92,246,0.1);color:var(--acc5);}
.st-Cerrado{background:rgba(239,68,68,0.1);color:var(--acc3);}
.st-Construccion{background:rgba(245,158,11,0.1);color:var(--acc4);}

/* Botones e Inputs */
.btn{padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:8px;transition:0.2s;}
.btn-primary{background:var(--acc2);color:white;}
.btn-outline{background:transparent;border:1px solid var(--brd);color:var(--mid);}
input, select{width:100%;background:var(--sur2);border:1px solid var(--brd);padding:10px;border-radius:6px;color:var(--txt);margin-top:4px;}

/* Modales */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-content{background:var(--sur);border:1px solid var(--brd);width:95%;max-width:900px;border-radius:20px;padding:30px;max-height:90vh;overflow-y:auto;}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:16px">
    <div style="width:40px;height:40px;background:var(--acc2);border-radius:10px"></div>
    <div><h1 class="syne">Skysense · XMs</h1><p class="mono" style="font-size:10px;color:var(--dim)" id="hdate"></p></div>
  </div>
  <div style="display:flex;gap:12px">
    <button class="btn btn-outline" onclick="exportExcel()">📊 Exportar Detalle</button>
    <button class="btn btn-primary" onclick="openModal('m-add')">+ Nuevo Proyecto</button>
  </div>
</header>

<main>
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="card"><label>Total Facility</label><div class="syne" style="font-size:1.5rem">$250.0M</div></div>
    <div class="card"><label>Inversión Activa</label><div id="kpi-invested" class="syne" style="font-size:1.5rem">$0.00</div></div>
    <div class="card"><label>Proyectos</label><div id="kpi-count" class="syne" style="font-size:1.5rem">0</div></div>
    <div class="card"><label>Recuperación</label><div id="kpi-recovery" class="syne" style="font-size:1.5rem">$0.00</div></div>
  </div>

  <div class="grid" style="grid-template-columns: 2fr 1fr;">
    <div class="card"><h3 class="syne" style="font-size:0.9rem">Distribución de Capital</h3><canvas id="mainChart" height="100"></canvas></div>
    <div class="card"><h3 class="syne" style="font-size:0.9rem">Estatus</h3><canvas id="statusChart"></canvas></div>
  </div>

  <div class="card">
    <h3 class="syne" style="font-size:0.9rem;margin-bottom:20px">Portafolio XMs</h3>
    <table>
      <thead>
        <tr><th>Proyecto</th><th>Estatus</th><th>Inversión</th><th>Hitos Pagados</th><th>Acciones</th></tr>
      </thead>
      <tbody id="p-body"></tbody>
    </table>
  </div>
</main>

<div id="m-edit" class="modal">
  <div class="modal-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 class="syne" style="color:var(--acc2)">Control de Cobranza</h2>
      <button class="btn btn-primary" onclick="addHitoRow()">+ Añadir Mensualidad</button>
    </div>
    
    <div id="edit-body"></div>

    <div style="display:flex;gap:12px;margin-top:30px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal('m-edit')">Cerrar</button>
      <button class="btn btn-primary" onclick="saveProyecto()">💾 Guardar Cambios</button>
    </div>
  </div>
</div>

<div id="m-add" class="modal"><div class="modal-content" style="max-width:450px"><h2 class="syne">Nuevo Proyecto</h2><label>Nombre</label><input type="text" id="add-nombre"><label>Inversión</label><input type="number" id="add-inversion"><button class="btn btn-primary" style="margin-top:20px" onclick="addNewProyecto()">Crear</button></div></div>

<script>
let projects = [];
let charts = {};
const fmt = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(v);

function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

function initCharts(){
  charts.main = new Chart(document.getElementById('mainChart'), {
    type:'bar', data:{labels:[], datasets:[{label:'Inversión', data:[], backgroundColor:'#3B82F6'}]},
    options:{responsive:true, scales:{y:{beginAtZero:true, grid:{color:'#1E2D45'}}}}
  });
  charts.status = new Chart(document.getElementById('statusChart'), {
    type:'doughnut', data:{labels:['Activo','Pipeline','En Construcción','Cerrado'], datasets:[{data:[0,0,0,0], backgroundColor:['#10B981','#8B5CF6','#F59E0B','#EF4444']}]},
    options:{plugins:{legend:{position:'bottom', labels:{color:'#F1F5F9'}}}}
  });
}

function refresh() {
  const tbody = document.getElementById('p-body');
  tbody.innerHTML = '';
  let totalI = 0, totalR = 0, counts = {'Activo':0, 'Pipeline':0, 'En Construcción':0, 'Cerrado':0};

  projects.forEach((p, i) => {
    totalI += p.inversion;
    counts[p.status]++;
    const hitosOk = p.hitos ? p.hitos.filter(h => h.cobrado).length : 0;
    p.hitos?.forEach(h => { if(h.cobrado) totalR += h.monto; });

    tbody.innerHTML += `<tr>
      <td><strong>${p.nombre}</strong></td>
      <td><span class="badge st-${p.status.replace(' ','')}">${p.status}</span></td>
      <td class="mono">${fmt(p.inversion)}</td>
      <td class="mono">${hitosOk}/${p.hitos?p.hitos.length:0}</td>
      <td><button class="btn btn-outline" style="padding:6px" onclick="editProyecto(${i})">✏️ Editar</button></td>
    </tr>`;
  });

  document.getElementById('kpi-invested').textContent = fmt(totalI);
  document.getElementById('kpi-count').textContent = projects.length;
  document.getElementById('kpi-recovery').textContent = fmt(totalR);

  charts.main.data.labels = projects.map(p => p.nombre);
  charts.main.data.datasets[0].data = projects.map(p => p.inversion);
  charts.main.update();
  charts.status.data.datasets[0].data = Object.values(counts);
  charts.status.update();
}

function editProyecto(i) {
  const p = projects[i]; if(!p.hitos) p.hitos = [];
  document.getElementById('edit-body').innerHTML = `
    <div class="grid" style="grid-template-columns:1fr 1fr; gap:15px">
      <div><label>Nombre</label><input type="text" id="e-nombre" value="${p.nombre}"></div>
      <div><label>Estatus</label><select id="e-status">
        <option value="Pipeline" ${p.status==='Pipeline'?'selected':''}>Pipeline</option>
        <option value="En Construcción" ${p.status==='En Construcción'?'selected':''}>En Construcción</option>
        <option value="Activo" ${p.status==='Activo'?'selected':''}>Activo</option>
        <option value="Cerrado" ${p.status==='Cerrado'?'selected':''}>Cerrado</option>
      </select></div>
      <div><label>Firma Contrato</label><input type="date" id="e-firma" value="${p.fechaFirma||''}"></div>
      <div><label>Inversión ($)</label><input type="number" id="e-inversion" value="${p.inversion}"></div>
      <div><label>Monto Anticipo</label><input type="number" id="e-ant-m" value="${p.anticipoMonto||0}"></div>
      <div><label>Fecha Anticipo</label><input type="date" id="e-ant-f" value="${p.anticipoFecha||''}"></div>
    </div>
    <div id="hitos-list" style="margin-top:20px">${p.hitos.map(h => generateHitoHTML(h)).join('')}</div>
    <input type="hidden" id="edit-idx" value="${i}">
  `;
  openModal('m-edit');
}

function generateHitoHTML(h) {
  return `<div class="hito-row" style="display:grid; grid-template-columns:1fr 1fr 1fr 0.5fr 40px; gap:10px; margin-bottom:10px; align-items:end; border-bottom:1px solid var(--brd); padding-bottom:10px">
    <div><label style="font-size:9px">Prog. Pago</label><input type="date" class="h-prog" value="${h.fechaProgramada||''}"></div>
    <div><label style="font-size:9px">Monto ($)</label><input type="number" class="h-monto" value="${h.monto||0}"></div>
    <div><label style="font-size:9px">Fecha Cobro</label><input type="date" class="h-cobro" value="${h.fechaCobro||''}"></div>
    <div style="text-align:center"><label style="font-size:9px">OK</label><br><input type="checkbox" class="h-ok" ${h.cobrado?'checked':''} style="width:20px;height:20px"></div>
    <button class="btn" style="background:var(--acc3);padding:5px" onclick="this.parentElement.remove()">✕</button>
  </div>`;
}

function addHitoRow(){ document.getElementById('hitos-list').insertAdjacentHTML('beforeend', generateHitoHTML({})); }

function saveProyecto() {
  const i = document.getElementById('edit-idx').value; const p = projects[i];
  p.nombre = document.getElementById('e-nombre').value;
  p.status = document.getElementById('e-status').value;
  p.inversion = parseFloat(document.getElementById('e-inversion').value);
  p.fechaFirma = document.getElementById('e-firma').value;
  p.anticipoMonto = parseFloat(document.getElementById('e-ant-m').value);
  p.anticipoFecha = document.getElementById('e-ant-f').value;
  p.hitos = Array.from(document.querySelectorAll('.hito-row')).map(r => ({
    fechaProgramada: r.querySelector('.h-prog').value,
    monto: parseFloat(r.querySelector('.h-monto').value),
    fechaCobro: r.querySelector('.h-cobro').value,
    cobrado: r.querySelector('.h-ok').checked
  }));
  closeModal('m-edit'); refresh(); if(window.saveCloud) saveCloud();
}

function exportExcel() {
  const data = [];
  projects.forEach(p => {
    const base = {"Proyecto":p.nombre, "Estatus":p.status, "Inversión":p.inversion, "Firma Contrato":p.fechaFirma, "Anticipo $":p.anticipoMonto};
    if(p.hitos?.length) p.hitos.forEach((h,idx) => data.push({...base, "Mes":idx+1, "Prog":h.fechaProgramada, "Monto":h.monto, "Cobro Real":h.fechaCobro, "Pagado":h.cobrado?'SÍ':'NO'}));
    else data.push(base);
  });
  XLSX.writeFile(XLSX.utils.book_new().appendChild(XLSX.utils.json_to_sheet(data), "XMs"), "Reporte_XMs.xlsx");
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('hdate').textContent = new Date().toLocaleDateString();
  initCharts(); refresh();
});
</script>
</body>
</html>
