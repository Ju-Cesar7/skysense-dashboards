<title>Skysense · Credit Facility Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#080E1D;--surface:#0F1928;--surface2:#172033;--surface3:#1E2D45;
  --border:#1E2D45;--border2:#243452;
  --accent:#00D4A0;--accent2:#3B82F6;--accent3:#F87171;--accent4:#FBBF24;--accent5:#A78BFA;
  --text:#E2E8F0;--text-dim:#94A3B8;--text-muted:#475569;
  --green:#10B981;--red:#EF4444;--yellow:#F59E0B;--r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
.hdr{height:60px;background:linear-gradient(90deg,#030A1A 0%,#0D1833 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0;z-index:50;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-img{width:34px;height:34px;object-fit:contain;border-radius:6px;background:#fff;padding:2px;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:0.5px;}
.logo-sub{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
.hdr-sp{flex:1;}
.badge{background:rgba(0,51,153,0.4);border:1px solid rgba(0,85,204,0.5);color:#7BAAFF;padding:5px 14px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;}
.date-txt{font-size:11px;color:var(--text-muted);}
.toolbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:10px;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;}
.btn svg{width:14px;height:14px;flex-shrink:0;}
.btn-p{background:var(--accent);color:#000;}
.btn-p:hover{background:#00bfa8;box-shadow:0 3px 16px rgba(0,212,160,0.35);transform:translateY(-1px);}
.btn-s{background:var(--accent2);color:#fff;}
.btn-s:hover{background:#2563EB;transform:translateY(-1px);}
.btn-g{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-g:hover{border-color:var(--accent);color:var(--accent);}
.tsep{width:1px;height:24px;background:var(--border);margin:0 4px;}
.tabs{height:44px;background:var(--surface);border-bottom:2px solid var(--border);display:flex;align-items:flex-end;padding:0 28px;flex-shrink:0;}
.tab{padding:10px 20px 12px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-muted);transition:all 0.18s;letter-spacing:0.3px;text-transform:uppercase;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover{color:var(--text);}
.main{flex:1;overflow:hidden;}
.sa{height:100%;overflow-y:auto;padding:22px 28px;}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;transition:transform 0.2s;}
.kpi:hover{transform:translateY(-2px);}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.kpi.c1::after{background:var(--accent);} .kpi.c2::after{background:var(--accent2);} .kpi.c3::after{background:var(--accent3);} .kpi.c4::after{background:var(--accent4);} .kpi.c5::after{background:var(--accent5);}
.kpi-l{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.kpi-v{font-family:'DM Mono',monospace;font-size:21px;font-weight:500;line-height:1;}
.kpi-v.c1{color:var(--accent);} .kpi-v.c2{color:var(--accent2);} .kpi-v.c3{color:var(--accent3);} .kpi-v.c4{color:var(--accent4);} .kpi-v.c5{color:var(--accent5);}
.kpi-s{font-size:10px;color:var(--text-muted);margin-top:5px;}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.ct{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px;}
.cs{font-size:10px;color:var(--text-muted);margin-bottom:16px;}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.thdr{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.ttl{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.tcnt{font-size:11px;color:var(--text-muted);}
.sp{flex:1;}
.srch{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 12px;}
.srch input{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;width:170px;}
.srch input::placeholder{color:var(--text-muted);}
.fsel{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-size:11px;outline:none;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(30,45,69,0.4);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}
.mono{font-family:'DM Mono',monospace;font-size:11px;}
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;width:80px;}
.pfill{height:100%;border-radius:2px;}
.av{display:inline-flex;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-right:5px;vertical-align:middle;}
.atw{display:flex;align-items:center;gap:4px;}
.atyp{background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:3px 7px;font-size:10px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all 0.15s;}
.atyp.on{background:rgba(0,212,160,0.15);border-color:var(--accent);color:var(--accent);}
.ainp{width:54px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:3px 5px;color:var(--text);font-size:10px;font-family:'DM Mono',monospace;text-align:right;outline:none;}
.ainp:focus{border-color:var(--accent);}
.pm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.pm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.pm-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.pm-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.pm-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;}
.pm-rl{font-size:10px;color:var(--text-muted);}
.pm-st{display:flex;justify-content:space-between;margin-bottom:7px;}
.pm-sl{font-size:11px;color:var(--text-muted);}
.pm-sv{font-family:'DM Mono',monospace;font-size:11px;}
.pm-tgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
.pm-tg{background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:9px;color:var(--text-muted);}
.tsc{overflow-x:auto;max-height:calc(100vh - 290px);}
.stkl{position:sticky;left:0;background:var(--surface);z-index:5;}
.pgr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border);}
.pi{font-size:11px;color:var(--text-muted);}
.pbs{display:flex;gap:5px;}
.pb{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text-dim);cursor:pointer;}
.pb.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.ovl.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;width:520px;max-height:88vh;overflow-y:auto;position:relative;}
.mt{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:3px;}
.ms{font-size:12px;color:var(--text-muted);margin-bottom:22px;}
.cls{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-size:12px;outline:none;font-family:'DM Sans',sans-serif;}
.fi:focus{border-color:var(--accent);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.drop{border:2px dashed var(--border);border-radius:10px;padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:16px;}
.drop:hover,.drop.drag{border-color:var(--accent);background:rgba(0,212,160,0.04);}
.tplr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;margin-bottom:14px;font-size:11px;color:var(--text-dim);}
.tplr a{color:var(--accent);text-decoration:none;font-weight:600;}
.atgl{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.atg{padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all 0.15s;}
.atg.on{background:var(--accent);color:#000;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid var(--accent);border-radius:9px;padding:12px 18px;font-size:12px;z-index:500;opacity:0;transition:opacity 0.3s,transform 0.3s;transform:translateY(8px);pointer-events:none;}
.toast.on{opacity:1;transform:translateY(0);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

const PMBG={'Rubén Paredes':'rgba(0,212,160,0.15)','Isabel Bazán':'rgba(59,130,246,0.15)','Anahí Reyes':'rgba(167,139,250,0.15)','Sergio Villalpando':'rgba(251,191,36,0.15)','Jonatan Miranda':'rgba(248,113,113,0.15)','Marcela Trejo':'rgba(52,211,153,0.15)','Francisco Cervantes':'rgba(96,165,250,0.15)'};

function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmt(v){v=Math.abs(v);if(v>=1e6)return '$'+(v/1e6).toFixed(2)+'M';if(v>=1e3)return '$'+(v/1e3).toFixed(1)+'K';return '$'+v.toFixed(0);}
function fmtN(v){return '$'+Number(v).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);}
function calcA(p){const m=p.monthly[0]?p.monthly[0].amount:(p.monto_contrato/p.mensualidades);return p.anticipo_tipo==='porcentaje'?m*(p.anticipo_valor/100):p.anticipo_valor;}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
  PMS.forEach(pm=>{['flt-pm','flt-pm-x'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const o=document.createElement('option');o.value=pm;o.textContent=pm;s.appendChild(o);});});
  rKPI();rCharts();filterP();rPM();renderX();
});

function rKPI(){
  const tot=projects.reduce((s,p)=>s+p.monto_contrato,0);
  const pag=projects.reduce((s,p)=>s+p.pagado,0);
  const pnd=projects.reduce((s,p)=>s+Math.max(0,p.por_pagar),0);
  const may=projects.reduce((s,p)=>{const m=p.monthly.find(x=>x.date==='2026-05');return s+(m?m.amount:0);},0);
  const pmc=new Set(projects.map(p=>p.pm)).size;
  document.getElementById('k0').textContent=fmt(tot);
  document.getElementById('k1').textContent=fmt(pag);
  document.getElementById('k2').textContent=fmt(pnd);
  document.getElementById('k3').textContent=fmt(may);
  document.getElementById('k4').textContent=projects.length;
  document.getElementById('k0s').textContent=projects.length+' proyectos activos';
  document.getElementById('k1s').textContent=(pag/tot*100).toFixed(1)+'% del portafolio';
  document.getElementById('k2s').textContent=(pnd/tot*100).toFixed(1)+'% restante';
  document.getElementById('k4s').textContent=pmc+' PMs asignados';
}

const CH={};
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
function rCharts(){
  const mm={};projects.forEach(p=>p.monthly.forEach(m=>{mm[m.date]=(mm[m.date]||0)+m.amount;}));
  const mk=Object.keys(mm).sort().slice(0,18);
  const ml=mk.map(m=>{const [y,mo]=m.split('-');return ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(mo)]+"'"+y.slice(2);});
  dc('m');CH['m']=new Chart(document.getElementById('ch-monthly'),{type:'bar',data:{labels:ml,datasets:[{label:'Cobro',data:mk.map(m=>mm[m]),backgroundColor:'rgba(0,212,160,0.65)',borderColor:'#00D4A0',borderWidth:1,borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtN(c.raw)}}  },scales:{x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#475569',font:{size:9}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#475569',font:{size:9},callback:v=>fmt(v)}}}  }});
  const tp=projects.reduce((s,p)=>s+Math.max(0,p.pagado),0),tpe=projects.reduce((s,p)=>s+Math.max(0,p.por_pagar),0);
  dc('d');CH['d']=new Chart(document.getElementById('ch-donut'),{type:'doughnut',data:{labels:['Pagado','Por Cobrar'],datasets:[{data:[tp,tpe],backgroundColor:['#00D4A0','#1E2D45'],borderColor:['#00D4A0','#2d3f5c'],borderWidth:2}]},options:{responsive:true,cutout:'70%',plugins:{legend:{labels:{color:'#94A3B8',font:{size:11}}},tooltip:{callbacks:{label:c=>c.label+': '+fmtN(c.raw)}}}  }});
  const t10=[...projects].sort((a,b)=>b.monto_contrato-a.monto_contrato).slice(0,10);
  dc('t');CH['t']=new Chart(document.getElementById('ch-top'),{type:'bar',data:{labels:t10.map(p=>p.nombre),datasets:[{label:'Monto',data:t10.map(p=>p.monto_contrato),backgroundColor:t10.map(p=>(PMC[p.pm]||'#00D4A0')+'99'),borderColor:t10.map(p=>PMC[p.pm]||'#00D4A0'),borderWidth:1,borderRadius:3}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtN(c.raw)}}  },scales:{x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#475569',font:{size:9},callback:v=>fmt(v)}},y:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:10}}}}  }});
  const ptot={};projects.forEach(p=>{ptot[p.pm]=(ptot[p.pm]||0)+p.monto_contrato;});
  const pns=Object.keys(ptot);
  dc('pd');CH['pd']=new Chart(document.getElementById('ch-pmd'),{type:'doughnut',data:{labels:pns,datasets:[{data:pns.map(n=>ptot[n]),backgroundColor:pns.map(n=>PMC[n]||'#666'),borderColor:'#0F1928',borderWidth:2}]},options:{responsive:true,cutout:'55%',plugins:{legend:{labels:{color:'#94A3B8',font:{size:10}},position:'bottom'},tooltip:{callbacks:{label:c=>c.label+': '+fmtN(c.raw)}}  }}});
  const pmm={};projects.forEach(p=>{if(!pmm[p.pm])pmm[p.pm]={};p.monthly.slice(0,12).forEach(m=>{pmm[p.pm][m.date]=(pmm[p.pm][m.date]||0)+m.amount;});});
  const mo12=mk.slice(0,12),la12=ml.slice(0,12);
  dc('pb');CH['pb']=new Chart(document.getElementById('ch-pmb'),{type:'bar',data:{labels:la12,datasets:PMS.filter(pm=>pmm[pm]).map(pm=>{return{label:pm,data:mo12.map(m=>pmm[pm]?pmm[pm][m]||0:0),backgroundColor:(PMC[pm]||'#666')+'99',borderColor:PMC[pm]||'#666',borderWidth:1,borderRadius:2};})  },options:{responsive:true,plugins:{legend:{labels:{color:'#94A3B8',font:{size:10}},position:'bottom'},tooltip:{mode:'index',callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}  },scales:{x:{stacked:true,grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#475569',font:{size:9}}},y:{stacked:true,grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#475569',font:{size:9},callback:v=>fmt(v)}}}  }});
}

let pg=1,fil=[];const PS=14;
function filterP(){
  pg=1;
  const s=document.getElementById('srch').value.toLowerCase();
  const pm=document.getElementById('flt-pm').value;
  fil=projects.filter(p=>(!s||(p.nombre.toLowerCase().includes(s)||p.pm.toLowerCase().includes(s)))&&(!pm||p.pm===pm));
  const tot=fil.length,st=(pg-1)*PS,items=fil.slice(st,st+PS);
  document.getElementById('lc').textContent=tot+' proyectos';
  document.getElementById('pgi').textContent=`${st+1}–${Math.min(st+PS,tot)} de ${tot}`;
  const tb=document.getElementById('tbody');tb.innerHTML='';
  items.forEach(p=>{
    const pct=p.monto_contrato>0?Math.max(0,Math.min(100,p.pagado/p.monto_contrato*100)):0;
    const col=PMC[p.pm]||'#00D4A0',bg=PMBG[p.pm]||'rgba(0,212,160,0.15)';
    const mp=p.monthly[0]?p.monthly[0].amount:0,ac=calcA(p);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><b style="font-size:12px">${p.nombre}</b></td>
      <td><span class="av" style="background:${bg};color:${col}">${ini(p.pm)}</span><span style="font-size:11px;color:var(--text-dim)">${p.pm}</span></td>
      <td class="mono">${p.mensualidades}</td>
      <td class="mono">${fmtN(p.monto_contrato)}</td>
      <td class="mono" style="color:var(--accent)">${fmtN(Math.max(0,p.pagado))}</td>
      <td class="mono" style="color:var(--accent3)">${fmtN(Math.max(0,p.por_pagar))}</td>
      <td><span style="font-size:10px;color:var(--text-muted)">${pct.toFixed(1)}%</span><div class="pbar"><div class="pfill" style="width:${pct}%;background:${col}"></div></div></td>
      <td class="mono" style="color:var(--accent4)">${fmtN(mp)}</td>
      <td><div class="atw">
        <span class="atyp ${p.anticipo_tipo==='porcentaje'?'on':''}" onclick="setAT(${p.id},'porcentaje')">%</span>
        <span class="atyp ${p.anticipo_tipo==='monto'?'on':''}" onclick="setAT(${p.id},'monto')">$</span>
      </div></td>
      <td><input class="ainp" type="number" value="${p.anticipo_valor}" onchange="setAV(${p.id},this.value)"></td>
      <td class="mono" style="color:var(--accent5)">${fmtN(ac)}</td>`;
    tb.appendChild(tr);
  });
  const tp2=Math.ceil(tot/PS),pb=document.getElementById('pgb');pb.innerHTML='';
  for(let i=1;i<=Math.min(tp2,8);i++){const b=document.createElement('button');b.className='pb'+(i===pg?' on':'');b.textContent=i;b.onclick=(()=>{const x=i;return()=>{pg=x;filterP();}})();pb.appendChild(b);}
}
function setAT(id,t){const p=projects.find(x=>x.id===id);if(p){p.anticipo_tipo=t;filterP();rPM();}}
function setAV(id,v){const p=projects.find(x=>x.id===id);if(p){p.anticipo_valor=parseFloat(v)||0;filterP();rPM();}}

function rPM(){
  const pm={};
  projects.forEach(p=>{if(!pm[p.pm])pm[p.pm]={tot:0,pag:0,pnd:0,cnt:0,pr:[],may:0,ant:0};
    pm[p.pm].tot+=p.monto_contrato;pm[p.pm].pag+=p.pagado;pm[p.pm].pnd+=Math.max(0,p.por_pagar);pm[p.pm].cnt++;pm[p.pm].pr.push(p.nombre);
    const m=p.monthly.find(x=>x.date==='2026-05');pm[p.pm].may+=(m?m.amount:0);pm[p.pm].ant+=calcA(p);
  });
  const g=document.getElementById('pm-grid');g.innerHTML='';
  PMS.filter(n=>pm[n]).forEach(n=>{
    const d=pm[n],col=PMC[n]||'#00D4A0',bg=PMBG[n]||'rgba(0,212,160,0.15)',pct=d.tot>0?(d.pag/d.tot*100):0;
    const c=document.createElement('div');c.className='pm-card';
    c.innerHTML=`<div class="pm-hd"><div class="pm-av" style="background:${bg};color:${col}">${ini(n)}</div>
      <div><div class="pm-nm">${n}</div><div class="pm-rl">PM · ${d.cnt} proyectos</div></div></div>
      <div class="pm-st"><span class="pm-sl">Portafolio</span><span class="pm-sv" style="color:${col}">${fmt(d.tot)}</span></div>
      <div class="pm-st"><span class="pm-sl">Pagado</span><span class="pm-sv" style="color:var(--accent)">${fmt(d.pag)}</span></div>
      <div class="pm-st"><span class="pm-sl">Por Cobrar</span><span class="pm-sv" style="color:var(--accent3)">${fmt(d.pnd)}</span></div>
      <div class="pm-st"><span class="pm-sl">Cobro May'26</span><span class="pm-sv" style="color:var(--accent4)">${fmt(d.may)}</span></div>
      <div class="pm-st"><span class="pm-sl">Anticipo Est.</span><span class="pm-sv" style="color:var(--accent5)">${fmt(d.ant)}</span></div>
      <div class="pbar" style="margin-top:10px"><div class="pfill" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
      <div style="font-size:9px;color:var(--text-muted);margin-top:3px">${pct.toFixed(1)}% cobrado</div>
      <div class="pm-tgs">${d.pr.map(x=>`<span class="pm-tg">${x}</span>`).join('')}</div>`;
    g.appendChild(c);
  });
}

function renderX(){
  const pmf=document.getElementById('flt-pm-x').value;
  const filt=pmf?projects.filter(p=>p.pm===pmf):projects;
  const aM=new Set();filt.forEach(p=>p.monthly.forEach(m=>aM.add(m.date)));
  const ms=[...aM].sort().slice(0,24);
  const ml=ms.map(m=>{const [y,mo]=m.split('-');return ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(mo)]+"'"+y.slice(2);});
  const tots=new Array(ms.length).fill(0);
  document.getElementById('xh').innerHTML=`<tr><th class="stkl" style="min-width:150px">Proyecto</th><th style="min-width:110px">PM</th>${ml.map(l=>`<th style="min-width:100px;text-align:right">${l}</th>`).join('')}<th style="min-width:110px;text-align:right">TOTAL</th></tr>`;
  let rows='';
  filt.forEach(p=>{
    const col=PMC[p.pm]||'#00D4A0';
    const amts=ms.map(m=>{const e=p.monthly.find(x=>x.date===m);return e?e.amount:0;});
    const rt=amts.reduce((s,a)=>s+a,0);
    amts.forEach((a,i)=>tots[i]+=a);
    rows+=`<tr><td class="stkl mono" style="font-size:11px;font-weight:600">${p.nombre}</td><td><span style="color:${col};font-size:10px">${p.pm}</span></td>${amts.map(a=>`<td class="mono" style="text-align:right;font-size:10px;color:var(--text-dim)">${a>0?'$'+Math.round(a).toLocaleString('es-MX'):'-'}</td>`).join('')}<td class="mono" style="text-align:right;font-size:11px;color:${col};font-weight:600">${Math.round(rt).toLocaleString('es-MX')}</td></tr>`;
  });
  const gt=tots.reduce((s,a)=>s+a,0);
  rows+=`<tr style="background:rgba(0,212,160,0.05)"><td class="stkl" style="color:var(--accent);font-size:11px;font-weight:700">TOTAL</td><td></td>${tots.map(t=>`<td class="mono" style="text-align:right;font-size:10px;color:var(--accent);font-weight:600">${Math.round(t).toLocaleString('es-MX')}</td>`).join('')}<td class="mono" style="text-align:right;font-size:11px;color:var(--accent);font-weight:700">${Math.round(gt).toLocaleString('es-MX')}</td></tr>`;
  document.getElementById('xb').innerHTML=rows;
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  const idx=['r','p','m','x'].indexOf(t);document.querySelectorAll('.tab')[idx].classList.add('on');
  ['r','p','m','x'].forEach(n=>{const el=document.getElementById('t-'+n);if(el)el.style.display=n===t?'block':'none';});
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('click',e=>{if(e.target.classList.contains('ovl'))e.target.classList.remove('open');});

let _at='p';
function tgAntic(t){_at=t;document.getElementById('atg-p').classList.toggle('on',t==='p');document.getElementById('atg-m').classList.toggle('on',t==='m');document.getElementById('av-unit').textContent=t==='p'?'% del pago mensual':'MXN fijo por mensualidad';}

let _f=null;
function onDrop(e){e.preventDefault();document.getElementById('dropz').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)prvF(f);}
function onFSel(e){const f=e.target.files[0];if(f)prvF(f);}
function prvF(f){_f=f;const p=document.getElementById('fprv');p.style.display='block';p.innerHTML=`📄 <b>${f.name}</b> · ${(f.size/1024).toFixed(1)} KB`;}
function doBulk(){if(!_f){toast('⚠️ Selecciona un archivo primero');return;}toast('✅ Cargado: '+_f.name);closeModal('m-masivo');_f=null;document.getElementById('fprv').style.display='none';}

function addP(){
  const n=document.getElementById('fn').value.trim(),pm=document.getElementById('fpm').value;
  const mo=parseFloat(document.getElementById('fmo').value)||0,me=parseInt(document.getElementById('fme').value)||36;
  const pg2=parseFloat(document.getElementById('fpg').value)||0,ini=document.getElementById('fini').value||'2026-05';
  const av=parseFloat(document.getElementById('fav').value)||10;
  if(!n||!pm||!mo){toast('⚠️ Completa los campos requeridos');return;}
  const monthly=[];const [sy,sm]=ini.split('-').map(Number);
  for(let i=0;i<me;i++){let moi=sm+i,yr=sy+Math.floor((moi-1)/12);moi=((moi-1)%12)+1;monthly.push({date:yr+'-'+(moi<10?'0':'')+moi,amount:Math.round(mo/me*100)/100});}
  const nid=projects.reduce((mx,p)=>Math.max(mx,p.id),0)+1;
  projects.push({id:nid,nombre:n,pm,mensualidades:me,monto_contrato:mo,pagado:pg2,por_pagar:mo-pg2,anticipo_tipo:_at==='p'?'porcentaje':'monto',anticipo_valor:av,monthly});
  rKPI();rCharts();filterP();rPM();renderX();closeModal('m-manual');toast('✅ "'+n+'" agregado al portafolio');
  ['fn','fmo','fme','fpg','fnts'].forEach(id=>document.getElementById(id).value='');document.getElementById('fpm').value='';
}

function exportCSV(){
  const h=['Proyecto','PM','Mensualidades','Monto Contrato','Pagado','Por Cobrar','% Avance','Pago Mensual','Anticipo Tipo','Anticipo Valor','Anticipo Estimado'];
  const r=projects.map(p=>{const pct=p.monto_contrato>0?(p.pagado/p.monto_contrato*100).toFixed(1)+'%':'0%';const m=p.monthly[0]?p.monthly[0].amount:0;return[p.nombre,p.pm,p.mensualidades,p.monto_contrato,p.pagado,Math.max(0,p.por_pagar),pct,m,p.anticipo_tipo,p.anticipo_valor,calcA(p)];});
  const csv=[h,...r].map(x=>x.map(c=>JSON.stringify(c)).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='Skysense_CreditFacility_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('✅ CSV exportado · Formato Skysense');
}

function exportExcel(){
  const d=[['Skysense – P$250M Credit Facility'],['Generado: '+new Date().toLocaleDateString('es-MX')],[],
    ['Proyecto','PM','Mensualidades','Monto Contrato','Pagado','Por Cobrar','% Avance','Pago Mensual','Anticipo Tipo','Valor Anticipo','Anticipo Est.']];
  projects.forEach(p=>{const pct=p.monto_contrato>0?(p.pagado/p.monto_contrato*100).toFixed(1)+'%':'0%';const m=p.monthly[0]?p.monthly[0].amount:0;d.push([p.nombre,p.pm,p.mensualidades,p.monto_contrato,p.pagado,Math.max(0,p.por_pagar),pct,m,p.anticipo_tipo,p.anticipo_valor,calcA(p)]);});
  d.push([]);const tot=f=>projects.reduce((s,p)=>s+f(p),0);
  d.push(['TOTALES','',projects.length,tot(p=>p.monto_contrato),tot(p=>p.pagado),tot(p=>Math.max(0,p.por_pagar)),'','','','',tot(p=>calcA(p)).toFixed(2)]);
  const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(d);
  ws['!cols']=[20,18,12,18,18,18,10,18,14,14,14].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,'Portafolio');XLSX.writeFile(wb,'Skysense_CreditFacility_'+new Date().toISOString().slice(0,10)+'.xlsx');toast('✅ Excel exportado · Formato Skysense');
}

function dlTpl(){
  const t=[['PLANTILLA SKYSENSE – CARGA MASIVA'],[''],[],
    ['Proyecto *','PM *','Mensualidades *','Monto Contrato *','Pagado','Inicio (YYYY-MM)','Anticipo Tipo','Anticipo Valor'],
    ['Ejemplo A','Rubén Paredes','36','5000000','0','2026-05','porcentaje','10'],
    ['Ejemplo B','Isabel Bazán','48','8000000','2000000','2026-06','monto','50000']];

  XLSX.writeFile(wb,'Plantilla_Skysense.xlsx');toast('📥 Plantilla descargada');
}
